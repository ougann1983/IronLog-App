<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronLog</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #f4f4f9;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .delete-btn {
            width: auto;
            padding: 5px 10px;
            background: #FF3B30;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>IronLog 健身录入</h2>
        <input type="text" id="action" placeholder="动作名称 (如: 深蹲)">
        <input type="number" id="weight" placeholder="重量 (kg)">
        <button onclick="handleAdd()">记录</button>
    </div>

    <div class="card">
        <p>今日总吨位: <span id="total-tonnage">0</span> kg</p>
        <div id="log-list"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
