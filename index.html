<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IronLog</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #f4f4f9;
            padding: 20px;
            padding-bottom: 80px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 5px;
        }

        .delete-btn {
            background: #FF3B30;
            padding: 5px 10px;
            width: auto;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>🔥 记录训练</h2>
        <select id="group-select" onchange="updateExerciseOptions()">
            <option value="">请选择部位</option>
        </select>
        <select id="exercise-select">
            <option value="">请先选择部位</option>
        </select>
        <input type="number" id="weight" placeholder="重量 (kg)">
        <input type="number" id="reps" placeholder="次数">
        <button onclick="handleAddLogFromUI()">提交记录</button>
    </div>

    <div class="card">
        <h3>⚙️ 管理</h3>
        <input type="text" id="new-group-name" placeholder="新部位名称">
        <button onclick="addNewGroup()" style="background: #34C759;">添加部位</button>
        <input type="text" id="new-exercise-name" placeholder="新动作名称">
        <button onclick="addNewExercise()" style="background: #34C759;">添加动作到选中部位</button>
        <button onclick="initializeData()" style="background: #666;">一键初始化(重置)</button>
    </div>

    <div class="card">
        <p>今日总吨位: <span id="total-tonnage">0</span> kg</p>
        <div id="log-list"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
